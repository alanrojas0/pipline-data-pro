name: Ejecutar Pipeline de Datos en Docker

on:
  push:
    branches: [ "main" ]
  
  # --- SCHEDULER COMENTADO (Referencia para el puesto de Data Engineer) ---
  # schedule:
  #   - cron: '0 11 * * 1' # Esto ejecutaría el proceso cada lunes a las 8:00 AM Chile
  # -----------------------------------------------------------------------

  workflow_dispatch: # Mantenemos el botón para ejecución manual

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: 1. Descargar el código del repositorio
      uses: actions/checkout@v4

    - name: 2. Construir la imagen de Docker
      run: docker build -t pipeline-pro-image .

    - name: 3. Ejecutar el Pipeline (ETL)
      run: |
        docker run -v ${{ github.workspace }}/data:/app/data pipeline-pro-image

    - name: 4. 📦 Subir resultados (Artifacts)
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: reporte-completo-y-rechazos
        path: |
          data/gold/
          data/rejected/